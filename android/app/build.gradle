plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.danielux135.memorylux"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.danielux135.memorylux"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders += [appLabel: "Memorylux"]
    }
    flavorDimensions "edition"
    productFlavors {
        free {
            dimension "edition"
            applicationIdSuffix ".free"
            resValue "string", "app_name", "Memorylux Gratis"
            manifestPlaceholders += [appLabel: "Memorylux Gratis"]
        }
        paid {
            dimension "edition"
            applicationIdSuffix ".paid"
            resValue "string", "app_name", "Memorylux"
            manifestPlaceholders += [appLabel: "Memorylux"]
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
}

flutter {
    source = "../.."
}
