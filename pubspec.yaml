name: memorylux
description: Post-its inteligentes que no desaparecen hasta que haces lo importante. Panel visual, alarmas persistentes y sincronización en la nube.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  table_calendar: ^3.1.0
  provider: ^6.1.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  uuid: ^4.4.0
  connectivity_plus: ^7.2.0
  timezone: ^0.11.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.1
  http: ^1.4.0
  google_mobile_ads: ^6.0.0
  in_app_purchase: ^3.2.3
  flutter_svg: ^2.2.1
  home_widget: 0.7.0+1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/icon.png
    background_color: "#F7F1E5"
    theme_color: "#F7F1E5"
  windows:
    generate: true
    image_path: assets/icon/icon.png
    icon_size: 48
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#F7F1E5"
  adaptive_icon_foreground: assets/icon/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf
